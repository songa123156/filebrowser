ctn_home=$(realpath ..)
ctn_name=$(basename $ctn_home)
ctn_img=img_$ctn_name
ctn_admin=$ctn_home/admin
ctn_volume=$ctn_home/volume
# docker
run_as_user=filebrowser
# env var = "" or (a=b c=d...)
envvar_map=()
# volumes 
volume_map=(
   "$ctn_volume/data:/home/filebrowser/data:rw"
   "$ctn_volume/project_here:/srv:rw"
   "$ctn_volume/container-import:/container-import:ro"
   "$ctn_volume/container-export:/container-export:rw"
)
# ports = "" or (a:b c:d...)
port_map=("20080:80")
